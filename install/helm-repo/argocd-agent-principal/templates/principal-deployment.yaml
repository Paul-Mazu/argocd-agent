apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "argocd-agent-principal.deploymentName" . }}
  namespace: {{ include "argocd-agent-principal.namespace" . }}
  labels:
    {{- include "argocd-agent-principal.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "argocd-agent-principal.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "argocd-agent-principal.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "argocd-agent-principal.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      securityContext:
        fsGroup: 999
        fsGroupChangePolicy: "OnRootMismatch"
        runAsGroup: 999
        runAsNonRoot: true
        runAsUser: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: argocd-agent-principal
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - principal
          env:
          - name: ARGOCD_PRINCIPAL_LISTEN_HOST
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-principal.paramsConfigMapName" . }}
                key: principal.listen.host
                optional: true
          - name: ARGOCD_PRINCIPAL_LISTEN_PORT
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-principal.paramsConfigMapName" . }}
                key: principal.listen.port
                optional: true
          - name: ARGOCD_PRINCIPAL_LOG_LEVEL
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-principal.paramsConfigMapName" . }}
                key: principal.log.level
                optional: true
          - name: ARGOCD_PRINCIPAL_METRICS_PORT
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-principal.paramsConfigMapName" . }}
                key: principal.metrics.port
                optional: true
          - name: ARGOCD_PRINCIPAL_HEALTH_CHECK_PORT
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-principal.paramsConfigMapName" . }}
                key: principal.healthz.port
                optional: true
          - name: ARGOCD_PRINCIPAL_NAMESPACE
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-principal.paramsConfigMapName" . }}
                key: principal.namespace
                optional: true
          - name: ARGOCD_PRINCIPAL_ALLOWED_NAMESPACES
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-principal.paramsConfigMapName" . }}
                key: principal.allowed-namespaces
                optional: true
          - name: ARGOCD_PRINCIPAL_NAMESPACE_CREATE_ENABLE
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-principal.paramsConfigMapName" . }}
                key: principal.namespace-create.enable
                optional: true
          - name: ARGOCD_PRINCIPAL_NAMESPACE_CREATE_PATTERN
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-principal.paramsConfigMapName" . }}
                key: principal.namespace-create.pattern
                optional: true
          - name: ARGOCD_PRINCIPAL_NAMESPACE_CREATE_LABELS
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-principal.paramsConfigMapName" . }}
                key: principal.namespace-create.labels
                optional: true
          - name: ARGOCD_PRINCIPAL_TLS_SECRET_NAME
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-principal.paramsConfigMapName" . }}
                key: principal.tls.secret-name
                optional: true
          - name: ARGOCD_PRINCIPAL_TLS_SERVER_CERT_PATH
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-principal.paramsConfigMapName" . }}
                key: principal.tls.server.cert-path
                optional: true
          - name: ARGOCD_PRINCIPAL_TLS_SERVER_KEY_PATH
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-principal.paramsConfigMapName" . }}
                key: principal.tls.server.key-path
                optional: true
          - name: ARGOCD_PRINCIPAL_TLS_SERVER_ALLOW_GENERATE
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-principal.paramsConfigMapName" . }}
                key: principal.tls.server.allow-generate
                optional: true
          - name: ARGOCD_PRINCIPAL_TLS_CLIENT_CERT_REQUIRE
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-principal.paramsConfigMapName" . }}
                key: principal.tls.client-cert.require
                optional: true
          - name: ARGOCD_PRINCIPAL_TLS_SERVER_ROOT_CA_SECRET_NAME
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-principal.paramsConfigMapName" . }}
                key: principal.tls.server.root-ca-secret-name
                optional: true
          - name: ARGOCD_PRINCIPAL_TLS_SERVER_ROOT_CA_PATH
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-principal.paramsConfigMapName" . }}
                key: principal.tls.server.root-ca-path
                optional: true
          - name: ARGOCD_PRINCIPAL_TLS_CLIENT_CERT_MATCH_SUBJECT
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-principal.paramsConfigMapName" . }}
                key: principal.tls.client-cert.match-subject
                optional: true
          - name: ARGOCD_PRINCIPAL_TLS_MIN_VERSION
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-principal.paramsConfigMapName" . }}
                key: principal.tls.min-version
                optional: true
          - name: ARGOCD_PRINCIPAL_TLS_MAX_VERSION
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-principal.paramsConfigMapName" . }}
                key: principal.tls.max-version
                optional: true
          - name: ARGOCD_PRINCIPAL_TLS_CIPHERSUITES
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-principal.paramsConfigMapName" . }}
                key: principal.tls.ciphersuites
                optional: true
          - name: ARGOCD_PRINCIPAL_RESOURCE_PROXY_SECRET_NAME
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-principal.paramsConfigMapName" . }}
                key: principal.resource-proxy.secret-name
                optional: true
          - name: ARGOCD_PRINCIPAL_RESOURCE_PROXY_TLS_CERT_PATH
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-principal.paramsConfigMapName" . }}
                key: principal.resource-proxy.tls.cert-path
                optional: true
          - name: ARGOCD_PRINCIPAL_RESOURCE_PROXY_TLS_KEY_PATH
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-principal.paramsConfigMapName" . }}
                key: principal.resource-proxy.tls.key-path
                optional: true
          - name: ARGOCD_PRINCIPAL_RESOURCE_PROXY_CA_SECRET_NAME
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-principal.paramsConfigMapName" . }}
                key: principal.resource-proxy.ca.secret-name
                optional: true
          - name: ARGOCD_PRINCIPAL_RESOURCE_PROXY_TLS_CA_PATH
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-principal.paramsConfigMapName" . }}
                key: principal.resource-proxy.ca.path
                optional: true
          - name: ARGOCD_PRINCIPAL_JWT_ALLOW_GENERATE
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-principal.paramsConfigMapName" . }}
                key: principal.jwt.allow-generate
                optional: true
          - name: ARGOCD_PRINCIPAL_JWT_SECRET_NAME
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-principal.paramsConfigMapName" . }}
                key: principal.jwt.secret-name
                optional: true
          - name: ARGOCD_PRINCIPAL_JWT_KEY_PATH
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-principal.paramsConfigMapName" . }}
                key: principal.jwt.key-path
                optional: true
          - name: ARGOCD_PRINCIPAL_AUTH
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-principal.paramsConfigMapName" . }}
                key: principal.auth
                optional: true
          - name: ARGOCD_PRINCIPAL_LOG_FORMAT
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-principal.paramsConfigMapName" . }}
                key: principal.log.format
                optional: true
          - name: ARGOCD_PRINCIPAL_ENABLE_WEBSOCKET
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-principal.paramsConfigMapName" . }}
                key: principal.websocket.enable
                optional: true
          - name: ARGOCD_PRINCIPAL_REDIS_COMPRESSION_TYPE
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-principal.paramsConfigMapName" . }}
                key: principal.redis.compression.type
                optional: true
          - name: ARGOCD_PRINCIPAL_REDIS_SERVER_ADDRESS
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-principal.paramsConfigMapName" . }}
                key: principal.redis.server.address
                optional: true
          - name: ARGOCD_PRINCIPAL_ENABLE_RESOURCE_PROXY
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-principal.paramsConfigMapName" . }}
                key: principal.resource-proxy.enable
                optional: true
          - name: ARGOCD_PRINCIPAL_KEEP_ALIVE_MIN_INTERVAL
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-principal.paramsConfigMapName" . }}
                key: principal.keep-alive.min-interval
                optional: true
          - name: ARGOCD_PRINCIPAL_PPROF_PORT
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-principal.paramsConfigMapName" . }}
                key: principal.pprof.port
                optional: true
          - name: ARGOCD_PRINCIPAL_DESTINATION_BASED_MAPPING
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-principal.paramsConfigMapName" . }}
                key: principal.destination-based-mapping
                optional: true
          - name: ARGOCD_PRINCIPAL_APP_LABEL_SELECTOR
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-principal.paramsConfigMapName" . }}
                key: principal.app-label-selector
                optional: true
          - name: ARGOCD_PRINCIPAL_INSECURE_PLAINTEXT
            valueFrom:
              configMapKeyRef:
                name: {{ include "argocd-agent-principal.paramsConfigMapName" . }}
                key: principal.tls.insecure-plaintext
                optional: true
          - name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ .Values.argoCdRedisSecretName }}
                key: {{ .Values.argoCdRedisPasswordKey }}
          ports:
            - containerPort: {{ .Values.service.grpc.targetPort }}
              name: principal
            - containerPort: {{ .Values.service.metrics.targetPort }}
              name: metrics
            - containerPort: {{ .Values.service.healthz.targetPort }}
              name: healthz
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            capabilities:
              drop:
                - ALL
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.httpGet.path }}
              port: {{ .Values.probes.liveness.httpGet.port }}
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.httpGet.path }}
              port: {{ .Values.probes.readiness.httpGet.port }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          {{- end }}
          volumeMounts:
            - name: jwt-secret
              mountPath: /app/config/jwt
            - name: userpass-passwd
              mountPath: /app/config/userpass
      volumes:
      - name: userpass-passwd
        secret:
          secretName: {{ include "argocd-agent-principal.userpassSecretName" . }}
          items:
          - key: passwd
            path: passwd
          optional: true
      - name: jwt-secret
        secret:
          secretName: {{ .Values.jwtSecretName }}
          items:
          - key: jwt.key
            path: jwt.key
          optional: true
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
