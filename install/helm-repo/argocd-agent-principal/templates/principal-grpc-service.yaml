apiVersion: v1
kind: Service
metadata:
  name: {{ include "argocd-agent-principal.grpcServiceName" . }}
  namespace: {{ include "argocd-agent-principal.namespace" . }}
  labels:
    {{- include "argocd-agent-principal.labels" . | nindent 4 }}
  {{- with .Values.service.grpc.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.grpc.type }}
  ports:
  - name: https
    protocol: TCP
    port: {{ .Values.service.grpc.port }}
    targetPort: {{ .Values.service.grpc.targetPort }}
  selector:
    {{- include "argocd-agent-principal.selectorLabels" . | nindent 4 }}
